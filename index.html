<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>bevy_ui_actions — examples</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f1117;
            color: #c8cdd8;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 200px;
            min-width: 200px;
            border-right: 0.5px solid #2a2d3a;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 18px 14px 14px;
            border-bottom: 0.5px solid #2a2d3a;
        }

        .sidebar-header h1 {
            font-size: 12px;
            font-weight: 500;
            color: #e8eaf0;
            margin-bottom: 5px;
        }

        .sidebar-header a {
            font-size: 11px;
            color: #4a5068;
            text-decoration: none;
        }

        .sidebar-header a:hover { color: #6b7080; }

        .nav { flex: 1; overflow-y: auto; padding: 6px 0; }

        .nav-group {
            padding: 10px 14px 3px;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            color: #3a3f52;
        }

        .nav-item {
            padding: 7px 14px;
            font-size: 12px;
            color: #6b7080;
            cursor: pointer;
            border-left: 2px solid transparent;
        }

        .nav-item:hover { color: #a0a8b8; background: #161922; }

        .nav-item.active {
            color: #c8cdd8;
            border-left-color: #5a6080;
            background: #161922;
        }

        .code-panel {
            width: 38%;
            border-right: 0.5px solid #2a2d3a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .code-header {
            padding: 10px 16px;
            border-bottom: 0.5px solid #2a2d3a;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            flex-shrink: 0;
        }

        .code-header-left { display: flex; flex-direction: column; gap: 3px; }

        .code-title {
            font-size: 12px;
            font-weight: 500;
            color: #c8cdd8;
        }

        .code-desc {
            font-size: 11px;
            color: #4a5068;
            line-height: 1.4;
        }

        .code-header a {
            font-size: 11px;
            color: #4a5068;
            text-decoration: none;
            flex-shrink: 0;
            padding-top: 2px;
        }

        .code-header a:hover { color: #6b7080; }

        .file-tabs {
            display: none;
            flex-shrink: 0;
            border-bottom: 0.5px solid #2a2d3a;
            overflow-x: auto;
            white-space: nowrap;
        }

        .file-tabs.visible { display: flex; }

        .file-tab {
            padding: 6px 14px;
            font-size: 11px;
            color: #4a5068;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            flex-shrink: 0;
        }

        .file-tab:hover { color: #a0a8b8; background: #161922; }

        .file-tab.active {
            color: #c8cdd8;
            border-bottom-color: #5a6080;
            background: #161922;
        }

        .code-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
        }

        .code-scroll pre { margin: 0; min-height: 100%; }

        .code-scroll code {
            font-size: 11.5px !important;
            line-height: 1.6 !important;
            font-family: 'JetBrains Mono', 'Fira Code', monospace !important;
            background: transparent !important;
            padding: 16px !important;
        }

        .code-placeholder {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2a2d3a;
            font-size: 13px;
        }

        .demo-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .demo-header {
            padding: 10px 16px;
            border-bottom: 0.5px solid #2a2d3a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .demo-header span {
            font-size: 11px;
            color: #4a5068;
        }

        .btn-open {
            background: #1e2235;
            border: 0.5px solid #3a3f52;
            color: #a0a8b8;
            font-size: 11px;
            padding: 5px 12px;
            border-radius: 4px;
            text-decoration: none;
            white-space: nowrap;
        }

        .btn-open:hover { background: #252a40; color: #c8cdd8; }

        .demo-area {
            flex: 1;
            background: #1a1a2e;
            position: relative;
        }

        .demo-area iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .demo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2a2d3a;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h1>bevy_ui_actions</h1>
        <a href="https://docs.rs/bevy_ui_actions/latest/bevy_ui_actions/" target="_blank">docs.rs ↗</a>
    </div>
    <nav class="nav">
        <div class="nav-group">Showcase</div>
        <div class="nav-item" data-key="character_sheet">Character Sheet</div>

        <div class="nav-group">Drag &amp; Drop</div>
        <div class="nav-item" data-key="inventory_demo">Inventory</div>

        <div class="nav-group">Navigation</div>
        <div class="nav-item" data-key="tabs">Tabs</div>
        <div class="nav-item" data-key="scroll_view">Scroll view</div>

        <div class="nav-group">Widgets</div>
        <div class="nav-item" data-key="rich_tooltip">Rich tooltip</div>
        <div class="nav-item" data-key="progress_bar">Progress bars</div>
        <div class="nav-item" data-key="modal">Modal dialogs</div>
    </nav>
</div>

<div class="code-panel">
    <div class="code-header">
        <div class="code-header-left">
            <div class="code-title" id="code-title">&mdash;</div>
            <div class="code-desc" id="code-desc">Select an example</div>
        </div>
        <a id="code-src" href="#" target="_blank">source ↗</a>
    </div>
    <div class="file-tabs" id="file-tabs"></div>
    <div class="code-scroll" id="code-scroll">
        <div class="code-placeholder">&larr; select an example</div>
    </div>
</div>

<div class="demo-panel">
    <div class="demo-header">
        <span id="demo-label">No example loaded</span>
        <a class="btn-open" id="btn-open" href="#" target="_blank">Open fullscreen ↗</a>
    </div>
    <div class="demo-area">
        <div class="demo-placeholder" id="placeholder">Select an example from the sidebar</div>
        <iframe id="frame" style="display:none" title="demo"></iframe>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/rust.min.js"></script>
<script>
    const GH_RAW  = 'https://raw.githubusercontent.com/nazgull08/bevy_ui_actions/main/examples';
    const GH_VIEW = 'https://github.com/nazgull08/bevy_ui_actions/blob/main/examples';

    const examples = {
        character_sheet: {
            title: 'Character Sheet',
            desc:  'Viewport3d, drag & drop equipment, stat allocation, rich tooltips, modals, HyperText lore journal.',
            open:  'character_sheet/',
            files: [
                { label: 'main.rs',          path: 'character_sheet/main.rs' },
                { label: 'data.rs',           path: 'character_sheet/data.rs' },
                { label: 'equipment_tab.rs',  path: 'character_sheet/equipment_tab.rs' },
                { label: 'stats_tab.rs',      path: 'character_sheet/stats_tab.rs' },
                { label: 'lore_tab.rs',       path: 'character_sheet/lore_tab.rs' },
                { label: 'mannequin.rs',      path: 'character_sheet/mannequin.rs' },
                { label: 'ui_helpers.rs',     path: 'character_sheet/ui_helpers.rs' },
            ],
        },
        inventory_demo: {
            title: 'Inventory demo',
            desc:  'Drag colored items between slots. Uses Draggable, DropTarget and DragState.',
            open:  'inventory_demo/',
            files: [{ label: 'inventory_demo.rs', path: 'inventory_demo.rs' }],
        },
        tabs: {
            title: 'Tabs',
            desc:  'TabGroup, Tab and TabContent with automatic visibility switching.',
            open:  'tabs/',
            files: [{ label: 'tabs.rs', path: 'tabs.rs' }],
        },
        scroll_view: {
            title: 'Scroll view',
            desc:  'Scrollable containers with ListView selection and tabs combining both.',
            open:  'scroll_view/',
            files: [{ label: 'scroll_view.rs', path: 'scroll_view.rs' }],
        },
        rich_tooltip: {
            title: 'Rich tooltip',
            desc:  'Hover over items to see stat diffs and key-value sections.',
            open:  'rich_tooltip/',
            files: [{ label: 'rich_tooltip.rs', path: 'rich_tooltip.rs' }],
        },
        progress_bar: {
            title: 'Progress bars',
            desc:  'HP, MP, SP bars with keyboard controls: Q/W, A/S, Z/X, 1/2.',
            open:  'progress_bar/',
            files: [{ label: 'progress_bar.rs', path: 'progress_bar.rs' }],
        },
        modal: {
            title: 'Modal dialogs',
            desc:  'Confirm, custom and non-dismissable modals. ESC or backdrop to close.',
            open:  'modal/',
            files: [{ label: 'modal.rs', path: 'modal.rs' }],
        },
    };

    let currentKey = null;
    let currentFileIdx = 0;
    const codeCache = {};

    async function fetchCode(filePath) {
        if (codeCache[filePath]) return codeCache[filePath];
        const res = await fetch(GH_RAW + '/' + filePath);
        const text = await res.text();
        codeCache[filePath] = text;
        return text;
    }

    function renderCode(text) {
        const scroll = document.getElementById('code-scroll');
        const pre  = document.createElement('pre');
        const code = document.createElement('code');
        code.className   = 'language-rust';
        code.textContent = text;
        pre.appendChild(code);
        scroll.innerHTML = '';
        scroll.appendChild(pre);
        hljs.highlightElement(code);
    }

    function renderFileTabs(files, activeIdx) {
        const container = document.getElementById('file-tabs');
        container.innerHTML = '';
        if (files.length <= 1) {
            container.classList.remove('visible');
            return;
        }
        container.classList.add('visible');
        files.forEach((f, i) => {
            const tab = document.createElement('div');
            tab.className = 'file-tab' + (i === activeIdx ? ' active' : '');
            tab.textContent = f.label;
            tab.addEventListener('click', () => loadFile(i));
            container.appendChild(tab);
        });
    }

    async function loadFile(idx) {
        const ex = examples[currentKey];
        currentFileIdx = idx;
        renderFileTabs(ex.files, idx);

        const file = ex.files[idx];
        document.getElementById('code-src').href = GH_VIEW + '/' + file.path;

        const scroll = document.getElementById('code-scroll');
        scroll.innerHTML = '<div class="code-placeholder">Loading...</div>';

        try {
            const text = await fetchCode(file.path);
            renderCode(text);
        } catch {
            scroll.innerHTML = '<div class="code-placeholder">Could not load source</div>';
        }
    }

    async function loadExample(key) {
        if (key === currentKey) return;
        currentKey = key;
        currentFileIdx = 0;

        const ex = examples[key];

        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.querySelector(`[data-key="${key}"]`).classList.add('active');

        document.getElementById('code-title').textContent = ex.title;
        document.getElementById('code-desc').textContent  = ex.desc;
        document.getElementById('demo-label').textContent = ex.title;
        document.getElementById('btn-open').href          = ex.open;

        const frame = document.getElementById('frame');
        const ph    = document.getElementById('placeholder');
        frame.src   = ex.open;
        frame.style.display = 'block';
        ph.style.display    = 'none';

        await loadFile(0);
    }

    document.querySelectorAll('.nav-item').forEach(el => {
        el.addEventListener('click', () => loadExample(el.dataset.key));
    });
</script>
</body>
</html>
